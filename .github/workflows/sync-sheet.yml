name: Weekly fallback rebuild

# The primary update path is now: Google Sheet edit → Apps Script onEdit
# trigger → Vercel deploy hook → Vercel rebuilds with fresh xlsx pulled at
# build time. This workflow is just a paranoid weekly fallback in case the
# Apps Script trigger is disabled or quietly broken.
#
# Cron is in UTC. 04:00 UTC = 06:00 CEST (summer) / 05:00 CET (winter).
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set — skipping."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK" | head -200
